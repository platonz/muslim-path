    <!-- Open Graph -->

    <meta property="og:description" content="Prayer times, Qibla direction, Quran, Duas, Tasbeeh, Islamic calendar and more." />
    <meta property="og:image"       content="https://www.muslimspath.app/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Muslim's Path — Daily Islamic Companion" />
    <meta name="twitter:description" content="Prayer times, Qibla direction, Quran, Duas, Tasbeeh and more." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />

    <meta name="theme-color" content="#C9A84C" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Muslim's Path" />
    <link rel="apple-touch-icon" href="/favicon-192.png" />

    <!-- Skeleton: gold shimmer on top edge prevents blank-white flash while JS loads -->
    <style>
      body { background: #0A0A0A; margin: 0; }
      #root:empty::after {
        content: "";
        display: block;
        height: 3px;
        background: linear-gradient(90deg, #0A0A0A 0%, #C9A84C 50%, #0A0A0A 100%);
        background-size: 200% 100%;
        animation: mp-shimmer 1.4s ease infinite;
        position: fixed;
        top: 0; left: 0; right: 0;
      }
      @keyframes mp-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    </style>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
